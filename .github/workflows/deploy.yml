name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env
        run: |
          echo "DB_USER=test-app_user" > .env
          echo "DB_PASSWORD=test-app_password" >> .env
          echo "DB_NAME=test-app_db" >> .env

      - name: Stop existing containers
        run: docker compose down --remove-orphans 2>/dev/null || true

      - name: Deploy
        run: docker compose up -d --build

      - name: Verify
        run: |
          sleep 10
          curl --fail http://localhost:3000/ || true
          echo "test-app deployed"
